<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Bé</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffffff;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 100%;
        }

        /* Chữ màu đỏ đô (Cảnh 1) */
        .text-red {
            color: #801a2d;
            font-size: 3rem;
            font-weight: bold;
            margin: 10px 0;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        /* Chữ màu xanh đen (Cảnh 2) */
        .text-dark {
            color: #2c3e50;
            font-size: 4.5rem;
            font-weight: bold;
            margin: 5px 0;
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        .show { opacity: 1 !important; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="container">
        <div id="scene1">
            <div id="l1" class="text-red">Tớ</div>
            <div id="l2" class="text-red">Không muốn</div>
            <div id="l3" class="text-red">chúng ta</div>
            <div id="l4" class="text-red">bỏ lỡ nhau</div>
        </div>

        <div id="scene2" class="hidden">
            <div id="l5" class="text-dark">muốn</div>
            <div id="l6" class="text-dark">bên</div>
            <div id="l7" class="text-dark">cậu</div>
        </div>
    </div>

    <script>
        window.onload = () => {
            // --- TIMELINE CHI TIẾT ---

            // Cảnh 1: Hiện từng dòng một
            setTimeout(() => document.getElementById('l1').classList.add('show'), 500);
            setTimeout(() => document.getElementById('l2').classList.add('show'), 1200);
            setTimeout(() => document.getElementById('l3').classList.add('show'), 2000);
            setTimeout(() => document.getElementById('l4').classList.add('show'), 2800);

            // Chuyển cảnh: Xóa sạch Cảnh 1 sau 5 giây
            setTimeout(() => {
                document.getElementById('scene1').classList.add('hidden');
            }, 5000);

            // Cảnh 2: Hiện "muốn bên cậu"
            setTimeout(() => {
                document.getElementById('scene2').classList.remove('hidden');
                
                // Hiện "muốn"
                setTimeout(() => document.getElementById('l5').classList.add('show'), 200);
                
                // Hiện "bên"
                setTimeout(() => document.getElementById('l6').classList.add('show'), 1000);
                
                // Hiện "cậu" - Chốt hạ cảnh 2
                setTimeout(() => document.getElementById('l7').classList.add('show'), 1800);
            }, 5500);
        };
    </script>
</body>
</html>
