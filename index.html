<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Bé</title>
    <style>
        /* CSS nằm luôn trong này cho tiện */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .content-wrapper {
            text-align: center;
            position: relative;
            width: 100%;
        }

        /* Chữ đỏ đô giống video */
        .text-red {
            color: #801a2d;
            font-size: 2.5rem;
            font-weight: bold;
            margin: 15px 0;
            opacity: 0; /* Mặc định ẩn */
            transform: translateY(10px);
            transition: all 0.5s ease;
        }

        /* Khi hiện chữ */
        .show {
            opacity: 1;
            transform: translateY(0);
        }

        /* Chữ cảnh cuối to hơn */
        .text-final {
            color: #2c3e50;
            font-size: 4rem;
            font-weight: bold;
            margin: 5px 0;
        }

        /* Hình vẽ xanh nguệch ngoạc */
        .blue-sketch {
            position: absolute;
            width: 50px;
            height: 40px;
            border: 4px solid #48dbfb;
            border-radius: 50% 40% 60% 30%;
            display: none;
            right: 15%;
            top: 65%;
            transform: rotate(-15deg);
        }

        #sketch2 {
            display: block;
            position: relative;
            margin: 20px auto;
            right: -80px;
            top: -100px;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="content-wrapper">
        <div id="scene1">
            <div id="t1" class="text-red">Tớ</div>
            <div id="t2" class="text-red">Không muốn</div>
            <div id="t3" class="text-red">chúng ta</div>
            <div id="t4" class="text-red" style="position: relative; display: inline-block;">
                bỏ lỡ nhau
                <div id="s1" class="blue-sketch"></div>
            </div>
        </div>

        <div id="scene2" class="hidden">
            <div class="text-final">muốn</div>
            <div class="text-final">bên</div>
            <div id="sketch2" class="blue-sketch"></div>
        </div>
    </div>

    <script>
        // JS điều khiển timeline chuẩn video
        window.onload = () => {
            // 1. Hiện "Tớ" sau 0.5s
            setTimeout(() => document.getElementById('t1').classList.add('show'), 500);
            
            // 2. Hiện "Không muốn" sau 1.2s
            setTimeout(() => document.getElementById('t2').classList.add('show'), 1200);
            
            // 3. Hiện "chúng ta" sau 2.0s
            setTimeout(() => document.getElementById('t3').classList.add('show'), 2000);
            
            // 4. Hiện "bỏ lỡ nhau" sau 2.8s
            setTimeout(() => {
                document.getElementById('t4').classList.add('show');
                document.getElementById('s1').style.display = 'block';
            }, 2800);

            // 5. Chuyển cảnh sau 5s (xóa sạch màn hình)
            setTimeout(() => {
                document.getElementById('scene1').classList.add('hidden');
            }, 5000);

            // 6. Hiện cảnh cuối sau 5.5s
            setTimeout(() => {
                document.getElementById('scene2').classList.remove('hidden');
            }, 5500);
        };
    </script>
</body>
</html>
