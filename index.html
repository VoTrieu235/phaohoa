<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Bé</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #fff;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 100%;
        }

        /* Chữ đỏ đoạn đầu */
        .text-red {
            color: #801a2d;
            font-size: 2.8rem;
            font-weight: bold;
            margin: 10px 0;
            opacity: 0;
            transition: opacity 0.4s ease-in;
        }

        /* Chữ xanh đen đoạn sau */
        .text-dark {
            color: #2c3e50;
            font-size: 4.5rem;
            font-weight: bold;
            margin: 5px 0;
            opacity: 0;
            transition: opacity 0.6s ease-in;
        }

        .show { opacity: 1 !important; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="container">
        <div id="scene1">
            <div id="l1" class="text-red">Tớ</div>
            <div id="l2" class="text-red">Không muốn</div>
            <div id="l3" class="text-red">chúng ta</div>
            <div id="l4" class="text-red">bỏ lỡ nhau</div>
        </div>

        <div id="scene2" class="hidden">
            <div id="l5" class="text-dark">muốn</div>
            <div id="l6" class="text-dark">bên</div>
            <div id="l7" class="text-dark">cậu</div>
        </div>
    </div>

    <script>
        window.onload = () => {
            // --- TIMELINE KHỚP VIDEO ---
            
            // Cảnh 1 hiện dần lên
            setTimeout(() => document.getElementById('l1').classList.add('show'), 500);
            setTimeout(() => document.getElementById('l2').classList.add('show'), 1200);
            setTimeout(() => document.getElementById('l3').classList.add('show'), 2000);
            setTimeout(() => document.getElementById('l4').classList.add('show'), 2800);

            // Chuyển cảnh (Màn hình trắng xóa)
            setTimeout(() => {
                document.getElementById('scene1').classList.add('hidden');
            }, 5000);

            // Cảnh 2 hiện ra
            setTimeout(() => {
                document.getElementById('scene2').classList.remove('hidden');
                
                // Hiện "muốn"
                setTimeout(() => document.getElementById('l5').classList.add('show'), 200);
                
                // Hiện "bên"
                setTimeout(() => document.getElementById('l6').classList.add('show'), 1000);
                
                // CHỐT HẠ: Hiện "cậu" (Giây cuối cùng của video)
                setTimeout(() => document.getElementById('l7').classList.add('show'), 1800);
            }, 5600);
        };
    </script>
</body>
</html>
